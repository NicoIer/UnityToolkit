<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420" role="img" aria-labelledby="title desc">
  <title id="title">Capabilities loop</title>
  <desc id="desc">Capability holder and capability system update loop with activation, deactivation and ticking.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .holder { fill: #f5f3ff; stroke: #7c3aed; }
      .system { fill: #ecfeff; stroke: #0891b2; }
      .step { fill: #ffffff; stroke: #94a3b8; stroke-width: 1.4; }
      .tick { fill: #f0fdf4; stroke: #16a34a; }
      .fixed { fill: #fff7ed; stroke: #ea580c; }
      .title { font: 700 24px Inter, Arial, sans-serif; fill: #0f172a; }
      .label { font: 700 16px Inter, Arial, sans-serif; fill: #0f172a; }
      .small { font: 400 12px Inter, Arial, sans-serif; fill: #334155; }
      .code { font: 600 12px "SFMono-Regular", Consolas, monospace; fill: #1e293b; }
      .line { fill: none; stroke: #64748b; stroke-width: 1.6; marker-end: url(#arrow); }
      .loop { fill: none; stroke: #7c3aed; stroke-width: 1.6; stroke-dasharray: 6 5; marker-end: url(#arrowPurple); }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <marker id="arrowPurple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7c3aed"/>
    </marker>
  </defs>

  <rect class="bg" width="960" height="420" rx="16"/>
  <text class="title" x="42" y="46">Capabilities Scheduling Model</text>

  <rect class="holder" x="64" y="94" width="230" height="224" rx="12"/>
  <text class="label" x="92" y="126">CapabilityHolder</text>
  <text class="small" x="92" y="153">Owner: GameObject / custom object</text>
  <rect class="step" x="94" y="176" width="150" height="32" rx="7"/>
  <text class="code" x="119" y="197">Capabilities[]</text>
  <rect class="step" x="94" y="222" width="150" height="32" rx="7"/>
  <text class="code" x="121" y="243">Components[]</text>
  <rect class="step" x="94" y="268" width="150" height="32" rx="7"/>
  <text class="code" x="133" y="289">Configs[]</text>
  <text class="small" x="92" y="336">BlockCapabilities(tag, instigator)</text>

  <rect class="system" x="370" y="94" width="230" height="224" rx="12"/>
  <text class="label" x="401" y="126">CapabilitySystem</text>
  <text class="small" x="401" y="153">Grouped by ETickGroup</text>
  <text class="small" x="401" y="174">Sorted by tickGroupOrder</text>
  <rect class="step" x="408" y="202" width="154" height="32" rx="7"/>
  <text class="code" x="435" y="223">Gameplay</text>
  <rect class="step" x="408" y="246" width="154" height="32" rx="7"/>
  <text class="code" x="443" y="267">Physics</text>

  <rect class="tick" x="676" y="92" width="220" height="112" rx="12"/>
  <text class="label" x="704" y="124">Update(deltaTime)</text>
  <text class="small" x="704" y="151">ShouldActivate / ShouldDeactivate</text>
  <text class="small" x="704" y="172">OnActivated / OnDeactivated</text>
  <text class="small" x="704" y="193">TickActive</text>

  <rect class="fixed" x="676" y="238" width="220" height="80" rx="12"/>
  <text class="label" x="704" y="270">FixedUpdate</text>
  <text class="small" x="704" y="297">active and implements IPhysicsTick</text>

  <path class="line" d="M294 206 H370"/>
  <path class="line" d="M600 148 H676"/>
  <path class="line" d="M600 262 H676"/>
  <path class="loop" d="M786 204 C782 358 534 368 484 318"/>
  <path class="loop" d="M484 94 C520 60 736 58 786 92"/>
  <text class="small" x="384" y="354">Capability state updates every frame. Holder provides dependencies and blocked-tag checks.</text>
</svg>
