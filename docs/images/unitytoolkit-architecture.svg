<svg xmlns="http://www.w3.org/2000/svg" width="960" height="430" viewBox="0 0 960 430" role="img" aria-labelledby="title desc">
  <title id="title">UnityToolkit structure overview</title>
  <desc id="desc">Overview diagram showing Core, Runtime, Editor, Network, Renderer and Capabilities modules.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .group { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; stroke-dasharray: 7 6; }
      .card { fill: #ffffff; stroke: #94a3b8; stroke-width: 1.4; }
      .core { fill: #ecfeff; stroke: #0891b2; }
      .runtime { fill: #f0fdf4; stroke: #16a34a; }
      .editor { fill: #fff7ed; stroke: #ea580c; }
      .network { fill: #fef2f2; stroke: #dc2626; }
      .cap { fill: #f5f3ff; stroke: #7c3aed; }
      .shader { fill: #eff6ff; stroke: #2563eb; }
      .title { font: 700 24px Inter, "Noto Sans SC", "Microsoft YaHei", Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 13px Inter, "Noto Sans SC", "Microsoft YaHei", Arial, sans-serif; fill: #475569; }
      .label { font: 700 17px Inter, "Noto Sans SC", "Microsoft YaHei", Arial, sans-serif; fill: #0f172a; }
      .small { font: 400 12px Inter, "Noto Sans SC", "Microsoft YaHei", Arial, sans-serif; fill: #334155; }
      .tag { font: 700 11px Inter, "Noto Sans SC", "Microsoft YaHei", Arial, sans-serif; fill: #475569; }
      .line { fill: none; stroke: #64748b; stroke-width: 1.5; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="960" height="430" rx="16"/>
  <text class="title" x="42" y="44">UnityToolkit 结构总览</text>
  <text class="subtitle" x="42" y="68">一个仓库中同时维护通用 C# 工具、Unity Runtime、Editor 扩展、网络工具和能力系统。</text>

  <rect class="group" x="38" y="96" width="610" height="292" rx="14"/>
  <text class="tag" x="58" y="120">UnityToolkit 程序集</text>

  <rect class="card core" x="342" y="145" width="250" height="112" rx="10"/>
  <text class="label" x="367" y="178">Core</text>
  <text class="small" x="367" y="204">事件 / Model / System</text>
  <text class="small" x="367" y="225">Pool / Collections / Math</text>
  <text class="small" x="367" y="246">不依赖 UnityEngine 的主体工具</text>

  <rect class="card runtime" x="72" y="145" width="230" height="112" rx="10"/>
  <text class="label" x="97" y="178">Runtime</text>
  <text class="small" x="97" y="204">UIFramework / Timer</text>
  <text class="small" x="97" y="225">Singleton / ObjectPool</text>
  <text class="small" x="97" y="246">Debugger / PathFind / Physics</text>

  <rect class="card network" x="72" y="294" width="230" height="68" rx="10"/>
  <text class="label" x="97" y="322">Network</text>
  <text class="small" x="97" y="345">MemoryPack / TCP / KCP / TimeSync</text>

  <rect class="card shader" x="342" y="294" width="250" height="68" rx="10"/>
  <text class="label" x="367" y="322">Renderer &amp; Shader</text>
  <text class="small" x="367" y="345">URP Feature / UI Depth / MotionBlur</text>

  <rect class="card editor" x="688" y="145" width="230" height="92" rx="10"/>
  <text class="label" x="713" y="178">Editor</text>
  <text class="small" x="713" y="204">菜单 / 模板 / Drawer</text>
  <text class="small" x="713" y="225">UIRoot 与 UIPanel 快速创建</text>

  <rect class="card cap" x="688" y="270" width="230" height="92" rx="10"/>
  <text class="label" x="713" y="303">Capabilities</text>
  <text class="small" x="713" y="329">Ability 风格能力系统</text>
  <text class="small" x="713" y="350">Holder / Tag / TickGroup</text>

  <path class="line" d="M342 201 H302"/>
  <path class="line" d="M467 257 V294"/>
  <path class="line" d="M302 328 H342"/>
  <path class="line" d="M592 201 H688"/>
  <path class="line" d="M592 224 C640 246 650 286 688 314"/>
  <path class="line" d="M302 224 C322 250 322 306 302 328"/>

  <rect class="card" x="360" y="36" width="240" height="46" rx="10"/>
  <text class="label" x="397" y="65">Unity Project / UPM</text>
  <path class="line" d="M480 82 V145"/>
</svg>
